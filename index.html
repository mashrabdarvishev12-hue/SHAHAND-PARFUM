<title>SHAHAND</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, doc, addDoc, deleteDoc, updateDoc, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyAs_VzUYQSy6h515wx32XiCJX0ULWHoIAs",
    authDomain:        "guzallik-dunyosi.firebaseapp.com",
    projectId:         "guzallik-dunyosi",
    storageBucket:     "guzallik-dunyosi.firebasestorage.app",
    messagingSenderId: "609051888368",
    appId:             "1:609051888368:web:52f75f20c1c34bb073d035"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  window._firebaseReady = false;
  window._db = db;
  window._addDoc = addDoc;
  window._collection = collection;
  window._serverTimestamp = serverTimestamp;
  window._updateDoc = updateDoc;
  window._doc = doc;

  // Buyurtma yuborish funksiyasi — module ichida, to'g'ridan-to'g'ri
  window._saveOrder = async function(orderData) {
    const ref = await addDoc(collection(db, 'orders'), orderData);
    return ref.id;
  };

  // Mijoz o'z buyurtmasini o'chirishi
  window._deleteOrder = async function(orderId) {
    await deleteDoc(doc(db, 'orders', orderId));
  };

  onSnapshot(collection(db, "products"), (snap) => {
    const fbProducts = [];
    snap.forEach(d => fbProducts.push({ id: d.id, ...d.data() }));
    if (fbProducts.length > 0) {
      window.products = fbProducts;
      window._firebaseReady = true;
      if (typeof renderProducts === 'function') renderProducts(window.products);
    }
  });

  onSnapshot(doc(db, "settings", "delivery"), (d) => {
    if (d.exists()) { window.deliverySettings = d.data(); }
  });

  onSnapshot(doc(db, "settings", "contact"), (d) => {
    if (d.exists()) {
      window.contactSettings = d.data();
      if (typeof renderContactPage === 'function') renderContactPage();
    }
  });

  onSnapshot(doc(db, "settings", "delivery"), (d) => {
    if (d.exists()) {
      window.deliverySettings = d.data();
      if (typeof renderCart === 'function') renderCart();
      if (typeof renderContactPage === 'function') renderContactPage();
    }
  });

  // Real-time zakaz kuzatuvi — admin status o'zgartirsa darhol app da ko'rinadi
  onSnapshot(collection(db, "orders"), (snap) => {
    const fbOrders = [];
    snap.forEach(d => fbOrders.push({ id: d.id, ...d.data() }));
    window._fbOrders = fbOrders;
    if (window.myOrders && window.myOrders.length > 0) {
      let changed = false;
      window.myOrders = window.myOrders.map(lo => {
        const fb = fbOrders.find(o => o.id === lo.id);
        if (!fb) {
          // Firebase'dan butunlay o'chirilgan — local'da ham olib tashlash
          changed = true;
          return null;
        }
        if (fb.deleted !== lo.deleted || fb.status !== lo.status || (fb.adminNote||'') !== (lo.adminNote||'')) {
          changed = true;
          return { ...lo, status: fb.status, adminNote: fb.adminNote || '', deleted: fb.deleted || false };
        }
        return lo;
      }).filter(Boolean);
      if (changed) {
        localStorage.setItem('myOrders', JSON.stringify(window.myOrders));
        if (typeof renderOrdersPage === 'function') renderOrdersPage();
      }
    }
  });
</script>

<style>

/* INFO */

  background:white; border-radius:20px; padding:20px;
  margin-bottom:16px; box-shadow:var(--shadow);
}

.contact-link {
  display:flex; align-items:center; gap:12px;

}

  width:40px; height:40px; border-radius:12px;
  display:flex; align-items:center; justify-content:center; font-size:20px;

  position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
  background:var(--dark); color:white; padding:12px 24px;
  border-radius:50px; font-size:13px; font-weight:700;
  z-index:400; opacity:0; transition:opacity 0.3s; white-space:nowrap;
}

.back-btn {

  font-size:14px; font-weight:700;
  font-family:'Nunito',sans-serif; cursor:pointer;
  backdrop-filter:blur(10px); transition:all 0.3s;

}

/* LIGHTBOX */
#imgLightbox {
  position:fixed; inset:0; background:rgba(0,0,0,0.92);
  z-index:9999; display:none; align-items:center;

}
#imgLightbox.show { display:flex; }
#imgLightbox img {
  max-width:95vw; max-height:85vh;
  object-fit:contain; border-radius:12px;

}
@keyframes zoomIn { from{transform:scale(0.88);opacity:0} to{transform:scale(1);opacity:1} }
#lightboxClose {
  position:fixed; top:18px; right:18px;

  background:rgba(255,255,255,0.15); border:none;

  display:flex; align-items:center; justify-content:center;
  backdrop-filter:blur(6px); transition:all 0.2s;
}

<script>
// OFFLINE DATA
window.products = [
  { id:"1", name:"Miss Dior", brand:"Dior", cat:"ayol", emoji:"🌹", vol:"100 ml", oldPrice:"850,000", price:"720,000", badge:"sale", stock:9, desc:"Nafis va romantik atir. Gul va yog'och notalarining uyg'unligi.", images:[] },
  { id:"2", name:"Bleu de Chanel", brand:"Chanel", cat:"erkak", emoji:"🔵", vol:"100 ml", oldPrice:"980,000", price:"840,000", badge:"sale", stock:9, desc:"Kuchli va ishonchli erkaklar atiri.", images:[] },
  { id:"3", name:"La Vie Est Belle", brand:"Lancôme", cat:"ayol", emoji:"🌸", vol:"75 ml", oldPrice:"", price:"650,000", badge:"new", stock:9, desc:"Hayot go'zal! Iris, pralin va vanil notalaridan.", images:[] },
  { id:"4", name:"Sauvage", brand:"Dior", cat:"erkak", emoji:"🌊", vol:"100 ml", oldPrice:"920,000", price:"780,000", badge:"sale", stock:9, desc:"Erkin va vahshiy. Bergamot va ambroxan kombinatsiyasi.", images:[] },
  { id:"5", name:"CK One", brand:"Calvin Klein", cat:"unisex", emoji:"✨", vol:"200 ml", oldPrice:"", price:"420,000", badge:"new", stock:9, desc:"Klassik unisex atir. Choy, bergamot va musk notalaridan.", images:[] },
  { id:"6", name:"Chance", brand:"Chanel", cat:"ayol", emoji:"🌺", vol:"100 ml", oldPrice:"1,100,000", price:"950,000", badge:"sale", stock:3, desc:"Tasodifiy uchrashuvlar uchun atir.", images:[] },
  { id:"7", name:"Gift Box Premium", brand:"Adel", cat:"gift", emoji:"🎁", vol:"3 ta atir", oldPrice:"1,500,000", price:"1,200,000", badge:"sale", stock:9, desc:"3 ta premium atirdan iborat maxsus sovg'a to'plami.", images:[] },
  { id:"8", name:"One Million", brand:"Paco Rabanne", cat:"erkak", emoji:"💛", vol:"100 ml", oldPrice:"", price:"750,000", badge:"new", stock:2, desc:"Oltin kabi qimmatli atir.", images:[] },
  { id:"9", name:"Black Opium", brand:"YSL", cat:"ayol", emoji:"🖤", vol:"90 ml", oldPrice:"1,050,000", price:"890,000", badge:"sale", stock:9, desc:"Qora qahva va vanil notalarining uyg'unligi.", images:[] },
];

window.deliverySettings = { base:10000, perKm:5, extra:10000, region:25000, regionTime:"1–3 kun", cityTime:"1–2 soat" };
window.contactSettings  = { phone:"+998901234567", phone2:"", telegram:"@guzallikdunyosi", address:"Toshkent, Chilonzor, Buyuk Ipak Yo'li 45", workDays:"Dushanba – Shanba: 9:00 – 20:00" };

let cart = [];
let currentCat = 'all';
let galleryIndex = 0;

window.addEventListener('load', () => {
  const status = document.getElementById('loadingStatus');
  let dots = 0;
  const interval = setInterval(() => {
    dots = (dots + 1) % 4;
    const isConnected = window._firebaseReady;
    if (isConnected) {
      status.textContent = '✅ Firebase ulandi!';
      document.getElementById('fbDot').classList.add('ok');
      document.getElementById('fbLabel').textContent = 'Jonli';
    } else {
      status.textContent = 'Yuklanmoqda' + '.'.repeat(dots);
    }
  }, 400);

  setTimeout(() => {
    clearInterval(interval);
    const screen = document.getElementById('loadingScreen');
    screen.classList.add('fade');
    setTimeout(() => screen.remove(), 500);
    renderProducts(window.products);
    renderContactPage();
    setFbStatus();
  }, 1800);
});

function setFbStatus() {
  const ok = window._firebaseReady;
  document.getElementById('fbDot').classList.toggle('ok', ok);
  document.getElementById('fbLabel').textContent = ok ? 'Jonli' : 'Offline';
}

// FIX 3: Mahsulot boshida rasm ko'rsatiladi (birinchi rasm)
function renderProducts(list) {
  const grid = document.getElementById('productsGrid');
  if (!grid) return;
  if (!list || list.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--gray)">😔 Mahsulot topilmadi</div>`;
    return;
  }
  grid.innerHTML = list.filter(p => p.active !== false).map(p => {
    const imgs = p.images || [];
    // FIX 3: 1-rasm product card boshida emoji ustiga chiqadi
    const imgContent = imgs.length > 0
      ? `<img src="${imgs[0]}" alt="${p.name}" onclick="event.stopPropagation();openLightbox('${imgs[0]}')" style="cursor:zoom-in">`
      : `<img src="default.jpg" alt="${p.name}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0">`;
    return `
    <div class="product-card" onclick="openModal('${p.id}')">
      <div class="product-img">
        ${p.badge ? `<div class="${p.badge==='new'?'badge-new':'badge-sale'}">${p.badge==='new'?'YANGI':'CHEGIRMA'}</div>` : ''}
        ${imgContent}
      </div>
      <div class="product-info">
        <div class="product-brand">${p.brand}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-vol">${p.vol}</div>
        ${p.stock <= 0 ? '<div class="stock-badge low">❌ Mahsulot tugagan</div>' : `<div class="stock-badge ${p.stock<=3?'low':''}">🔥 ${p.stock} ta qoldi</div>`}
        <div class="price-block">
          ${p.oldPrice ? `<div class="price-old">${p.oldPrice}</div>` : ''}
          <div class="price-new">${p.price}</div>
        </div>
        <button class="add-btn" onclick="event.stopPropagation();addToCart('${p.id}')" ${p.stock<=0?'disabled style="opacity:0.4;cursor:not-allowed"':''}>+</button>
      </div>
    </div>`;
  }).join('');
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters(document.querySelector('.search-bar input').value, cat);
}

function filterProducts(q) { applyFilters(q, currentCat); }

function applyFilters(q, cat) {
  let list = cat === 'all' ? window.products : window.products.filter(p => p.cat === cat);
  if (q && q.trim()) {
    const lo = q.toLowerCase();
    list = list.filter(p => p.name.toLowerCase().includes(lo) || p.brand.toLowerCase().includes(lo));
  }
  renderProducts(list);
}

// MODAL — gallery
function buildGallery(p) {
  const imgs = p.images || [];
  const total = imgs.length;
  let slides = total === 0
    ? `<div class="gallery-slide"><img src="default.jpg" alt="${p.name}" style="width:100%;height:100%;object-fit:cover"></div>`
    : imgs.map((src,i) => `<div class="gallery-slide"><img src="${src}" alt="rasm ${i+1}" onclick="openLightbox('${src}')" style="cursor:zoom-in"></div>`).join('');
  return `
    <div class="gallery-wrap" id="galleryWrap">
      ${total>0 ? `<div class="gallery-count" id="galleryCount">1/${total}</div>` : ''}
      <div class="gallery-slider" id="gallerySlider">${slides}</div>
      ${total>1 ? `<button class="gallery-arrow prev" onclick="galleryNav(-1)">‹</button><button class="gallery-arrow next" onclick="galleryNav(1)">›</button>` : ''}
      ${total>1 ? `<div class="gallery-dots" id="galleryDots">${imgs.map((_,i)=>`<div class="gallery-dot ${i===0?'active':''}" onclick="galleryGoTo(${i})"></div>`).join('')}</div>` : ''}
    </div>`;
}

function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('imgLightbox').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('imgLightbox').classList.remove('show');
  document.getElementById('lightboxImg').src = '';
  document.body.style.overflow = '';
}

let _modalId = null;
function openModal(id) {
  galleryIndex = 0;
  _modalId = id;
  const p = window.products.find(x => String(x.id) === String(id));
  if (!p) return;
  const ds = window.deliverySettings;
  const cs = window.contactSettings;

  // Dynamic pay methods
  const pays = ds && ds.pays
    ? Object.entries(ds.pays).filter(([,v])=>v).map(([k])=>{
        const names = {uzcard:'💳 Uzcard',humo:'💳 Humo',payme:'📱 Payme',cash:'💵 Naqt',click:'📲 Click'};
        return `<div class="pay-badge">${names[k]||k}</div>`;
      }).join('')
    : ['Uzcard','Humo','Payme','Naqt'].map(x=>`<div class="pay-badge">${x}</div>`).join('');

  document.getElementById('modalContent').innerHTML = `
    <div class="modal-handle"></div>
    <button class="modal-back-btn" onclick="closeModalDirect()">← Ortga</button>
    ${buildGallery(p)}
    <div class="modal-brand">${p.brand}</div>
    <div class="modal-name">${p.name}</div>
    <div class="modal-vol"> ${p.vol}</div>
    <div style="margin-bottom:12px"><span class="stock-badge ${p.stock<=3?'low':''}">🔥 ${p.stock} ta qoldi</span></div>
    <div class="modal-prices">
      ${p.oldPrice ? `<div class="modal-price-old">${p.oldPrice} so'm</div>` : ''}
      <div class="modal-price-new">${p.price} so'm</div>
    </div>
    <div class="modal-desc">🌸 ${p.desc}</div>
    <div class="info-row">
      <div class="info-label">🚗 Yetkazish</div>
      <div class="info-val">${(ds.base||10000).toLocaleString()} so'm (${ds.cityTime||'1–2 soat'})</div>
    </div>
    <div class="info-row">
      <div class="info-label">💳 To'lov</div>
      <div class="info-val"><div class="pay-methods">${pays}</div></div>
    </div>
    <div class="modal-btns">
      <a href="tel:${cs.phone||'+998901234567'}" class="btn-call">📞 Qo'ng'iroq</a>
      <button class="btn-add-cart" onclick="addToCart('${p.id}');closeModalDirect()">🛒 Savatga</button>
    </div>`;
  document.getElementById('productModal').classList.add('show');
}

function galleryNav(dir) {
  if (!_modalId) return;
  const p = window.products.find(x => String(x.id)===String(_modalId));
  if (!p || !p.images || p.images.length < 2) return;
  galleryIndex = (galleryIndex + dir + p.images.length) % p.images.length;
  applyGallerySlide(p.images.length);
}
function galleryGoTo(idx) {
  if (!_modalId) return;
  const p = window.products.find(x => String(x.id)===String(_modalId));
  if (!p) return;
  galleryIndex = idx;
  applyGallerySlide(p.images.length);
}
function applyGallerySlide(total) {
  const s = document.getElementById('gallerySlider');
  if (s) s.style.transform = `translateX(-${galleryIndex*100}%)`;
  const c = document.getElementById('galleryCount');
  if (c) c.textContent = `${galleryIndex+1}/${total}`;
  document.querySelectorAll('.gallery-dot').forEach((d,i) => d.classList.toggle('active', i===galleryIndex));
}

function closeModal(e) { if (e.target===document.getElementById('productModal')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('productModal').classList.remove('show'); _modalId=null; }

// CART
function addToCart(id) {
  const p = window.products.find(x => String(x.id)===String(id));
  if (!p) return;
  // Stock 0 bo'lsa savatga tushmaydi
  if (typeof p.stock === 'number' && p.stock <= 0) {
    showToast('❌ Mahsulot tugagan!');
    return;
  }
  const ex = cart.find(x => String(x.id)===String(id));
  if (ex) {
    // Savatdagi miqdor stockdan oshmasin
    if (typeof p.stock === 'number' && ex.qty >= p.stock) {
      showToast('❌ Omborda faqat ' + p.stock + ' ta bor!');
      return;
    }
    ex.qty++;
  }
  else cart.push({...p, qty:1});
  updateCartCount();
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

let deliveryKm = 0;
function calcDelivery(km) {
  const ds = window.deliverySettings || {};
  const base  = ds.base  || 10000;
  const perKm = ds.perKm || 5;
  const extra = ds.extra || 10000;
  if (!km || km <= 0) return base;
  if (km <= 10) return base;
  return base + Math.ceil((km-10) / perKm) * extra;
}

function updateKm(val) { deliveryKm = parseInt(val)||0; renderCart(); }

function renderCart() {
  const c = document.getElementById('cartItems');
  if (cart.length === 0) {
    c.innerHTML = `<div class="empty-cart"><div class="emoji">🛒</div><h3>Savat bo'sh</h3><p>Mahsulot qo'shing!</p></div>`;
    return;
  }
  const sub = cart.reduce((s,x) => s + parseInt(x.price.replace(/,/g,''))*x.qty, 0);
  const _ds = window.deliverySettings || {};
  const deliveryLabel = (_ds.deliveryLabel || '').trim();
  const del = deliveryLabel ? 0 : calcDelivery(deliveryKm);

  c.innerHTML = cart.map(x => `
    <div class="cart-item">
      <div class="cart-item-img">${x.images&&x.images[0]?`<img src="${x.images[0]}" style="width:60px;height:60px;object-fit:cover;border-radius:12px">`:x.emoji}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${x.name}</div>
        <div class="cart-item-price">${x.price} so'm</div>
        <div class="qty-control">
          <button class="qty-btn" onclick="changeQty('${x.id}',-1)">−</button>
          <div class="qty-num">${x.qty}</div>
          <button class="qty-btn" onclick="changeQty('${x.id}',1)">+</button>
        </div>
      </div>
      <button class="delete-btn" onclick="removeFromCart('${x.id}')">🗑️</button>
    </div>`).join('') + `
    <div class="cart-total">
      <div class="total-row"><span>🛍️ Mahsulotlar</span><span>${sub.toLocaleString()} so'm</span></div>
      <div class="total-row">
        <span>🚗 Yetkazish</span>
        <span>${deliveryLabel ? (_ds.base ? (_ds.base).toLocaleString()+' so\'m' : '—') : del.toLocaleString()+' so\'m'}</span>
      </div>
      ${deliveryLabel ? `
      <div style="background:rgba(255,255,255,0.2);border:1.5px solid rgba(255,255,255,0.4);border-radius:14px;padding:12px 14px;margin:4px 0 8px">
        <div style="font-size:13px;font-weight:700;color:white;line-height:1.65">${deliveryLabel}</div>
      </div>` : ''}
      <div class="total-row main"><span>Jami</span><span>${(sub + (deliveryLabel ? (_ds.base||0) : del)).toLocaleString()} so'm</span></div>
      <button class="checkout-btn" onclick="showCheckoutForm()">✅ Buyurtma berish</button>
    </div>

    <!-- Checkout forma -->
    <div class="checkout-form" id="checkoutForm" style="display:none">
      <div class="checkout-form-title">📋 Buyurtma ma'lumotlari</div>
      <div class="form-field">
        <label>👤 Ism familiya *</label>
        <input type="text" id="co_name" placeholder="Aziza Karimova">
      </div>
      <div class="form-field">
        <label>📱 Telefon raqam *</label>
        <input type="tel" id="co_phone" placeholder="+998901234567">
      </div>
      <div class="form-field">
        <label>✈️ Telegram username</label>
        <input type="text" id="co_tg" placeholder="@username">
      </div>
      <div class="form-field">
        <label>📍 Yetkazish manzili *</label>
        <input type="text" id="co_addr" placeholder="Toshkent, Yunusobod, 7-kvartal, 12-uy">
      </div>
      <div class="form-field">
        <label>💳 To'lov usuli</label>
        <select id="co_pay" onchange="showPaymentPanel(this.value); updateSubmitBtn()">
          <option value="">— Tanlang —</option>
          <option value="Uzcard">💳 Uzcard</option>
          <option value="Humo">💳 Humo</option>
          <option value="Naqt">💵 Naqt pul</option>
        </select>
      </div>

      <!-- TO'LOV PANELI -->
      <div id="paymentPanel" style="display:none;background:linear-gradient(135deg,#fce7f3,#fbcfe8);border-radius:16px;padding:16px;margin:12px 0;border:2px solid #f472b6">
        <div style="font-weight:800;color:#db2777;font-size:15px;margin-bottom:12px">💳 To'lov ma'lumotlari</div>
        <div id="paymentDetails"></div>
        <div style="margin-top:12px;padding:12px;background:white;border-radius:12px;text-align:center">
          <div style="font-size:12px;color:#6b7280;margin-bottom:4px">To'lov miqdori:</div>
          <div style="font-size:24px;font-weight:900;color:#db2777">${(sub+del).toLocaleString()} so'm</div>
        </div>
        <button onclick="confirmPayment()" style="width:100%;margin-top:12px;background:linear-gradient(135deg,#10b981,#059669);color:white;border:none;border-radius:50px;padding:14px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;cursor:pointer">
          ✅ To'lov qildim
        </button>

      <!-- CHEK YUKLASH MODALI -->
      <div id="receiptModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:9999;align-items:center;justify-content:center;padding:20px;box-sizing:border-box">
        <div style="background:white;border-radius:24px;padding:24px;width:100%;max-width:400px;position:relative">

function copyCard(num) {
  const clean = num.replace(/\s/g,'');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(clean).then(() => showToast('📋 Karta raqami nusxalandi!'));
  } else {
    const t = document.createElement('textarea');
    t.value = clean; document.body.appendChild(t); t.select();
    document.execCommand('copy'); document.body.removeChild(t);
    showToast('📋 Karta raqami nusxalandi!');
  }
}

function handleReceiptFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const allowed = ['image/jpeg','image/jpg','image/png','application/pdf'];
  if (!allowed.includes(file.type)) {
    showToast('❗ Faqat JPG, PNG yoki PDF!');
    return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    window._paymentReceiptBase64 = e.target.result;
    // Preview ko'rsatish
    const prev = document.getElementById('receiptPreview');
    if (prev) {
      if (file.type === 'application/pdf') {
        prev.innerHTML = '<div style="padding:16px;text-align:center;color:#065f46;font-size:14px;font-weight:700">📄 PDF fayl yuklandi: ' + file.name + '</div>';
      } else {
        prev.innerHTML = '<img src="' + e.target.result + '" style="width:100%;max-height:200px;object-fit:contain;border-radius:10px">';
      }
    }
    document.getElementById('receiptConfirmBtn').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

          <div style="font-size:13px;color:var(--gray)">${(ds.region||25000).toLocaleString()} so'm — ${ds.regionTime||'1–3 kun'}</div></div>
      </div>
    </div>
    <div class="info-card">
      <div class="info-card-title">💳 To'lov usullari</div>
      <div class="pay-methods">${payHtml}</div>
    </div>`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

function showPage(page) {
  document.getElementById('homePage').style.display = 'none';
  ['cartPage','catalogPage','ordersPage','profilePage','infoPage'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('show');
  });
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (page==='home')    { document.getElementById('homePage').style.display='block'; document.getElementById('nav-home').classList.add('active'); }
  else if (page==='catalog') { document.getElementById('catalogPage').classList.add('show'); document.getElementById('nav-catalog').classList.add('active'); renderCatalogPage(); }
  else if (page==='orders')  { document.getElementById('ordersPage').classList.add('show'); document.getElementById('nav-orders').classList.add('active'); renderOrdersPage(); }
  else if (page==='cart')    { document.getElementById('cartPage').classList.add('show'); document.getElementById('nav-cart').classList.add('active'); renderCart(); }
  else if (page==='profile') { document.getElementById('profilePage').classList.add('show'); document.getElementById('nav-profile').classList.add('active'); renderProfilePage(); }
  else if (page==='info')    { document.getElementById('infoPage').classList.add('show'); renderContactPage(); }
}

function renderCatalogPage() {
  const el = document.getElementById('catalogContent');
  if (!el) return;
  const prods = window.products || [];

  // Barcha mavjud kategoriyalarni mahsulotlardan dinamik aniqlash
  const CAT_META = {
    atir:   { label:'Atirlar',    emoji:'🌸' },
    ayol:   { label:'Ayollar',    emoji:'👩' },
    erkak:  { label:'Erkaklar',   emoji:'👨' },
    unisex: { label:'Unisex',     emoji:'✨' },
    gift:   { label:'Gift Set',   emoji:'🎁' },
    shampun:{ label:'Shampunlar', emoji:'🧴' },
    sovin:  { label:'Sovunlar',   emoji:'🧼' },
  };

  // Mavjud kategoriyalarni tartib bo'yicha chiqar
  const catOrder = ['atir','ayol','erkak','unisex','gift','shampun','sovin'];
  // Mahsulotlarda boshqa kategoriya bo'lsa ham qo'sh
  prods.forEach(p => { if (p.cat && !catOrder.includes(p.cat)) catOrder.push(p.cat); });

  const usedCats = catOrder.filter(k => prods.some(p => p.cat === k));

  if (usedCats.length === 0) {
    el.innerHTML = '<div style="text-align:center;padding:40px;color:#9ca3af">Mahsulotlar yuklanmoqda...</div>';
    return;
  }

  el.innerHTML = usedCats.map(catKey => {
    const meta = CAT_META[catKey] || { label: catKey, emoji: '📦' };
    const items = prods.filter(p => p.cat === catKey);
    return `
      <div style="margin-bottom:28px">
        <div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#1f1f2e;padding:10px 0 14px;display:flex;align-items:center;gap:10px;border-bottom:2px solid #fce7f3;margin-bottom:14px">
          <span style="font-size:28px">${meta.emoji}</span>
          ${meta.label}
          <span style="font-size:12px;background:#fce7f3;color:#db2777;border-radius:20px;padding:3px 12px;font-family:'Nunito',sans-serif;font-weight:700;margin-left:auto">${items.length} ta</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          ${items.map(p => `
            <div onclick="openProduct('${p.id}')" style="background:white;border-radius:16px;overflow:hidden;box-shadow:0 4px 16px rgba(244,114,182,0.12);cursor:pointer;transition:transform 0.2s" ontouchstart="this.style.transform='scale(0.97)'" ontouchend="this.style.transform=''">
              <div style="height:130px;background:linear-gradient(135deg,#fce7f3,#fbcfe8);display:flex;align-items:center;justify-content:center;font-size:48px;position:relative;overflow:hidden">
                ${p.images&&p.images[0]
                  ? `<img src="${p.images[0]}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0" loading="lazy">`
                  : `<img src="default.jpg" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0">`}
              </div>
              <div style="padding:10px">
                <div style="font-size:9px;text-transform:uppercase;letter-spacing:2px;color:#f472b6;font-weight:700">${p.brand||''}</div>
                <div style="font-family:'Playfair Display',serif;font-size:13px;font-weight:600;color:#1f1f2e;margin:3px 0 2px;line-height:1.3">${p.name}</div>
                ${p.vol||p.volume ? `<div style="font-size:10px;color:#9ca3af;margin-bottom:4px">${p.vol||p.volume}</div>` : ''}
                <div style="display:flex;align-items:baseline;gap:6px;flex-wrap:wrap">
                  ${(p.oldPrice&&p.oldPrice!=='') ? `<span style="font-size:10px;color:#9ca3af;text-decoration:line-through">${p.oldPrice}</span>` : ''}
                  <span style="font-size:14px;font-weight:800;color:#db2777">${p.price} so'm</span>
                </div>
              </div>
            </div>`).join('')}
        </div>
      </div>`;
  }).join('');
}

window.myOrders = JSON.parse(localStorage.getItem('myOrders')||'[]');
let myOrders = window.myOrders;

function renderOrdersPage() {
  const el = document.getElementById('ordersContent');
  if (!el) return;
  const orders = window.myOrders || myOrders || [];
  if (orders.length === 0) {
    el.innerHTML = `<div style="text-align:center;padding:60px 20px">
      <div style="font-size:64px;margin-bottom:16px">📦</div>
      <h3 style="font-family:'Playfair Display',serif;color:#1f1f2e;margin-bottom:8px">Buyurtmalar yo'q</h3>
      <p style="color:#9ca3af;font-size:14px">Hali hech qanday buyurtma bermagansiz</p>
      <button onclick="showPage('home')" style="margin-top:20px;background:linear-gradient(135deg,#f472b6,#db2777);color:white;border:none;border-radius:50px;padding:12px 28px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;cursor:pointer">🛍️ Xarid qilish</button>
    </div>`;
    return;
  }

  const statusMap = {
    new:        { label: "🆕 Yangi",          bg: "#fce7f3", color: "#db2777" },
    paid:       { label: "✅ To'landi",        bg: "#d1fae5", color: "#065f46" },
    delivering: { label: "🚗 Yo'lda",          bg: "#fef3c7", color: "#92400e" },
    done:       { label: "🏁 Yetkazildi",      bg: "#dbeafe", color: "#1e40af" },
    cancelled:  { label: "❌ Bekor qilindi",   bg: "#fee2e2", color: "#991b1b" },
  };
  const steps = ['new','paid','delivering','done'];
  const stepLabel = { new:"Yangi", paid:"To'landi", delivering:"Yo'lda", done:"Yetdi" };

  el.innerHTML = orders.slice().reverse().map((o, i) => {
    const isDeleted = !!o.deleted;
    const st = isDeleted
      ? { label: "🗑️ Karzinkada", bg: "#fee2e2", color: "#991b1b" }
      : (statusMap[o.status] || statusMap.new);
    const num = orders.length - i;
    const dateStr = o.createdAt ? new Date(o.createdAt).toLocaleString('uz-UZ',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
    const curIdx = steps.indexOf(o.status);
    return `
    <div style="background:white;border-radius:20px;padding:16px;margin-bottom:14px;box-shadow:0 4px 16px rgba(244,114,182,0.12)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div style="font-weight:800;color:#1f1f2e;font-size:15px">📦 Buyurtma #${num}</div>
        <div style="background:${st.bg};color:${st.color};border-radius:20px;padding:5px 12px;font-size:12px;font-weight:800">${st.label}</div>
      </div>
      <div style="font-size:12px;color:#9ca3af;margin-bottom:10px">🕐 ${dateStr}</div>
      ${o.adminNote ? `<div style="background:#fef3c7;border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:13px;color:#92400e;font-weight:600">💬 ${o.adminNote}</div>` : ''}
      <div style="border-top:1px solid #fce7f3;padding-top:10px">
        ${(o.items||[]).map(x=>`<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px"><span>${x.name}</span><span style="color:#db2777;font-weight:700">×${x.qty}</span></div>`).join('')}
      </div>
      <div style="border-top:1px solid #fce7f3;padding-top:10px;margin-top:6px;display:flex;justify-content:space-between;font-weight:800;color:#db2777;font-size:15px">
        <span>💰 Jami:</span><span>${(o.totalCost||0).toLocaleString()} so'm</span>
      </div>
      ${o.status !== 'cancelled' && !o.deleted ? `
      <div style="margin-top:12px;display:flex;gap:3px">
        ${steps.map((s,si) => `<div style="flex:1;text-align:center">
          <div style="height:4px;border-radius:4px;background:${si<=curIdx?'#db2777':'#fce7f3'};margin-bottom:3px"></div>
          <div style="font-size:9px;color:${si<=curIdx?'#db2777':'#9ca3af'};font-weight:${si<=curIdx?800:400}">${stepLabel[s]}</div>
        </div>`).join('')}
      </div>` : ''}
      ${o.deleted ? `
      <div style="background:#fff0f0;border:1.5px solid #fca5a5;border-radius:12px;padding:12px;margin-top:10px;text-align:center">
        <div style="font-size:22px;margin-bottom:4px">🗑️</div>
        <div style="font-weight:800;color:#dc2626;font-size:13px">Admin tomonidan o'chirildi</div>
        <div style="font-size:12px;color:#9ca3af;margin-top:4px">Admin qaytarsa bu yerda ko'rinadi</div>
      </div>` : (o.status !== 'paid' && o.status !== 'delivering') ? `
      <button onclick="deleteMyOrder('${o.id}')" style="margin-top:12px;width:100%;background:#fff0f0;color:#dc2626;border:1.5px solid #fca5a5;border-radius:50px;padding:10px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px">
        🗑️ O'chirish
      </button>` : ''}
    </div>`;
  }).join('');
}

    <div style="background:linear-gradient(135deg,#f9a8d4,#db2777);border-radius:24px;padding:28px 20px;text-align:center;margin-bottom:20px">
      <div style="width:80px;height:80px;background:rgba(255,255,255,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 12px">
        ${savedProfile.name ? savedProfile.name[0].toUpperCase() : '👤'}
      </div>
      <div style="font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:white">${savedProfile.name||'Mehmon'}</div>
      <div style="color:rgba(255,255,255,0.8);font-size:13px;margin-top:4px">${savedProfile.phone||'Telefon kiritilmagan'}</div>
    </div>
    <div style="background:white;border-radius:20px;padding:20px;margin-bottom:14px;box-shadow:0 4px 16px rgba(244,114,182,0.1)">
      <div style="font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:#1f1f2e;margin-bottom:16px">✏️ Ma'lumotlarni tahrirlash</div>
      <div style="margin-bottom:12px">
        <label style="font-size:12px;font-weight:700;color:#6b7280;display:block;margin-bottom:6px">👤 Ism familiya</label>
        <input id="prof_name" type="text" value="${savedProfile.name||''}" placeholder="Aziza Karimova"
          style="width:100%;border:2px solid #fce7f3;border-radius:12px;padding:10px 14px;font-family:'Nunito',sans-serif;font-size:14px;outline:none;color:#1f1f2e">
      </div>
      <div style="margin-bottom:12px">
        <label style="font-size:12px;font-weight:700;color:#6b7280;display:block;margin-bottom:6px">📱 Telefon</label>
        <input id="prof_phone" type="tel" value="${savedProfile.phone||''}" placeholder="+998901234567"
          style="width:100%;border:2px solid #fce7f3;border-radius:12px;padding:10px 14px;font-family:'Nunito',sans-serif;font-size:14px;outline:none;color:#1f1f2e">
      </div>
      <div style="margin-bottom:12px">
        <label style="font-size:12px;font-weight:700;color:#6b7280;display:block;margin-bottom:6px">✈️ Telegram</label>
        <input id="prof_tg" type="text" value="${savedProfile.telegram||''}" placeholder="@username"
          style="width:100%;border:2px solid #fce7f3;border-radius:12px;padding:10px 14px;font-family:'Nunito',sans-serif;font-size:14px;outline:none;color:#1f1f2e">
      </div>
      <div style="margin-bottom:16px">
        <label style="font-size:12px;font-weight:700;color:#6b7280;display:block;margin-bottom:6px">📍 Doimiy manzil</label>
        <input id="prof_addr" type="text" value="${savedProfile.address||''}" placeholder="Toshkent, Yunusobod..."
          style="width:100%;border:2px solid #fce7f3;border-radius:12px;padding:10px 14px;font-family:'Nunito',sans-serif;font-size:14px;outline:none;color:#1f1f2e">
      </div>
      <button onclick="saveProfile()" style="width:100%;background:linear-gradient(135deg,#f472b6,#db2777);color:white;border:none;border-radius:50px;padding:14px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;cursor:pointer">💾 Saqlash</button>
    </div>
    <div style="background:white;border-radius:20px;padding:16px;box-shadow:0 4px 16px rgba(244,114,182,0.1)">
      <div onclick="showPage('orders')" style="display:flex;align-items:center;gap:14px;padding:12px 0;cursor:pointer;border-bottom:1px solid #fce7f3">
        <span style="font-size:24px">📦</span>
        <div style="flex:1"><div style="font-weight:700;color:#1f1f2e">Buyurtmalarim</div><div style="font-size:12px;color:#9ca3af">${myOrders.length} ta buyurtma</div></div>
        <span style="color:#db2777;font-size:18px">›</span>
      </div>
      <div onclick="showPage('info')" style="display:flex;align-items:center;gap:14px;padding:12px 0;cursor:pointer">
        <span style="font-size:24px">📍</span>
        <div style="flex:1"><div style="font-weight:700;color:#1f1f2e">Do'kon haqida</div><div style="font-size:12px;color:#9ca3af">Aloqa va manzil</div></div>
        <span style="color:#db2777;font-size:18px">›</span>
      </div>
    </div>`;
}

function saveProfile() {
  savedProfile = {
    name:     document.getElementById('prof_name')?.value.trim(),
    phone:    document.getElementById('prof_phone')?.value.trim(),
    telegram: document.getElementById('prof_tg')?.value.trim(),
    address:  document.getElementById('prof_addr')?.value.trim(),
  };
  localStorage.setItem('userProfile', JSON.stringify(savedProfile));
  showToast('✅ Profil saqlandi!');
  renderProfilePage();
}

function openProduct(id) {
  const p = (window.products||[]).find(x => String(x.id)===String(id));
  if (!p) return;
  // reuse existing product modal
  const modal = document.getElementById('productModal');
  const content = document.getElementById('modalContent');
  if (!modal || !content) return;
  const imgs = p.images && p.images.length > 0
    ? p.images.map((src,i) => `<img src="${src}" onclick="openLightbox('${src}')" style="width:100%;height:260px;object-fit:cover;border-radius:20px 20px 0 0;display:${i===0?'block':'none'}" class="modal-img">`).join('')
    : `<div style="height:200px;background:linear-gradient(135deg,#fce7f3,#fbcfe8);display:flex;align-items:center;justify-content:center;font-size:80px;border-radius:20px 20px 0 0">${p.emoji||'🌸'}</div>`;
  content.innerHTML = `
    <div class="modal-handle"></div>
    ${imgs}
    <div style="padding:20px">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:2px;color:#f472b6;font-weight:700">${p.brand||''}</div>
      <h2 style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#1f1f2e;margin:6px 0">${p.name}</h2>
      <div style="font-size:13px;color:#6b7280;margin-bottom:10px">${p.volume||''}</div>
      <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:14px">
        ${p.oldPrice?`<span style="font-size:14px;color:#9ca3af;text-decoration:line-through">${p.oldPrice} so'm</span>`:''}
        <span style="font-size:24px;font-weight:800;color:#db2777">${p.price} so'm</span>
      </div>
      ${p.description?`<p style="font-size:14px;color:#6b7280;line-height:1.6;margin-bottom:16px">${p.description}</p>`:''}
      <div style="display:flex;gap:10px">
        <button class="btn-add-cart" onclick="addToCart('${p.id}');closeModalDirect()" style="flex:1;background:linear-gradient(135deg,#f472b6,#db2777);color:white;border:none;border-radius:50px;padding:14px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;cursor:pointer">🛒 Savatga</button>
      </div>
    </div>`;
  modal.classList.add('show');
}

async function deleteMyOrder(orderId) {
  if (!orderId) return;
  try {
    if (window._deleteOrder) await window._deleteOrder(orderId);
    window.myOrders = (window.myOrders || []).filter(o => o.id !== orderId);
    myOrders = window.myOrders;
    localStorage.setItem('myOrders', JSON.stringify(myOrders));
    showToast('🗑️ Buyurtma o\'chirildi!');
    renderOrdersPage();
  } catch(e) {
    showToast('❌ O\'chirishda xato: ' + (e.message || ''));
  }
}

async function clearAllOrders() {
  const orders = [...(window.myOrders || [])];
  try {
    for (const o of orders) {
      if (window._deleteOrder) {
        try { await window._deleteOrder(o.id); } catch(e) {}
      }
    }
    window.myOrders = [];
    myOrders = [];
    localStorage.setItem('myOrders', JSON.stringify([]));
    showToast('🗑️ Barcha buyurtmalar o\'chirildi!');
    renderOrdersPage();
  } catch(e) {
    showToast('❌ Xato yuz berdi');
  }
}

function updateCartCount() {
  const total = cart.reduce((s,x)=>s+x.qty,0);
  document.getElementById('cartCount').textContent = total;
  const navBadge = document.getElementById('cartCountNav');
  if (navBadge) { navBadge.textContent = total; navBadge.style.display = total>0?'flex':'none'; }
}
</script>
